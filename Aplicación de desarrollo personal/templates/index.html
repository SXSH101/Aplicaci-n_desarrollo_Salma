<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Desarrollo Personal</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="container">
        <h1>Registro de Desarrollo Personal</h1>

        <form method="POST" action="/guardar">

            <h2>Usuario</h2>
            <input type="text" name="nombre" placeholder="Nombre" required>
            <input type="number" name="edad" placeholder="Edad">

            <h2>Académico</h2>
            <input type="date" name="fecha" required>
            <input type="number" name="horas_estudio" placeholder="Horas de estudio">
            <input type="number" name="tareas_completadas" placeholder="Tareas completadas">
            <input type="number" name="concentracion" placeholder="Concentración (1-10)">
            <input type="number" name="rendimiento" placeholder="Rendimiento (1-10)">

            <button type="submit">Guardar Datos</button>

        </form>
    </div>

</body>
</html>
